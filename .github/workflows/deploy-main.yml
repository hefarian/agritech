# =========================================================================
# GitHub Actions Workflow - MAIN Server Deploy
# Deploy to MAIN server simulation (P12-PROD) on Windows self-hosted runner
# Ports: API 28000, Streamlit 28501, MLFlow 25000, Jupyter 28888
# =========================================================================

name: 🔴 Deploy MAIN Server

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'Documentation/**'
  workflow_dispatch:


env:
  P12_PROD_DIR: g:\GITHUB\Data-Scientist-OC\P12-PROD

jobs:
  deploy-prod-server:
    name: Deploy PROD Server (28000/28501/25000/28888)
    runs-on: [self-hosted, windows, p12-deploy]
    
    steps:
      - name: Deployment info
        shell: powershell
        run: |
          Write-Host "PROD Server Deployment" -ForegroundColor Blue
          Write-Host "  Branch: ${{ github.ref_name }}" -ForegroundColor Cyan
          Write-Host "  Commit: ${{ github.sha }}" -ForegroundColor Cyan
          Write-Host "  By: ${{ github.actor }}" -ForegroundColor Cyan
      
      - name: Sync code in PROD folder
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $TargetDir = "${{ env.P12_PROD_DIR }}"
          $Branch = "main"
          $RepoUrl = "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

          if (-not (Test-Path $TargetDir)) {
            New-Item -ItemType Directory -Path $TargetDir -Force | Out-Null
          }

          # Le runner tourne sous SYSTEM : on declare ce dossier comme safe pour Git.
          git config --global --add safe.directory $TargetDir

          Set-Location $TargetDir

          if (-not (Test-Path (Join-Path $TargetDir ".git"))) {
            Write-Host "No .git found, initializing repository in existing folder..." -ForegroundColor Yellow
            git init
            git remote add origin $RepoUrl
          }
          else {
            if ((git remote) -notcontains "origin") {
              git remote add origin $RepoUrl
            }
            else {
              git remote set-url origin $RepoUrl
            }
          }

          git fetch --prune origin $Branch
          git checkout -B $Branch "origin/$Branch"
      
      - name: Stop PROD server containers
        shell: powershell
        run: |
          cd "${{ env.P12_PROD_DIR }}"
          Write-Host "Stopping PROD server containers..." -ForegroundColor Yellow
          docker compose --project-name p12_prod --env-file .env down
        continue-on-error: true
      
      - name: Build PROD server images
        shell: powershell
        run: |
          cd "${{ env.P12_PROD_DIR }}"
          Write-Host "Building PROD server images..." -ForegroundColor Yellow
          docker compose --project-name p12_prod --env-file .env build
      
      - name: Start PROD server
        shell: powershell
        run: |
          cd "${{ env.P12_PROD_DIR }}"
          Write-Host "Starting PROD server..." -ForegroundColor Yellow
          docker compose --project-name p12_prod --env-file .env up -d
      
      - name: Wait for services
        shell: powershell
        run: Start-Sleep -Seconds 15
      
      - name: Health check
        shell: powershell
        run: |
          $maxAttempts = 30
          $attempt = 0
          while ($attempt -lt $maxAttempts) {
              try {
                  $response = Invoke-WebRequest -Uri "http://localhost:28000/health" -TimeoutSec 5
                  if ($response.StatusCode -eq 200) {
                      Write-Host "PROD API is HEALTHY on port 28000" -ForegroundColor Green
                      exit 0
                  }
              } catch {
                  $attempt++
                  if ($attempt -lt $maxAttempts) {
                      Write-Host "Attempt $attempt/$maxAttempts..." -ForegroundColor Yellow
                      Start-Sleep -Seconds 2
                  }
              }
          }
          Write-Host "PROD API health check failed" -ForegroundColor Red
          exit 1
      
      - name: Deployment success
        shell: powershell
        run: |
          Write-Host "PROD Server Deployed!" -ForegroundColor Green
          Write-Host "  API:       http://localhost:28000" -ForegroundColor White
          Write-Host "  Streamlit: http://localhost:28501" -ForegroundColor White
          Write-Host "  MLFlow:    http://localhost:25000" -ForegroundColor White
          Write-Host "  Jupyter:   http://localhost:28888" -ForegroundColor White
