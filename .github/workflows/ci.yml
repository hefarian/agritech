name: CI-CD

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Build API image
        run: docker build -t agritech-api .

  deploy-dev:
    if: github.event_name == 'push' && github.ref_name == 'dev'
    needs: test-and-build
    runs-on: [self-hosted, windows, p12-deploy]

    steps:
      - name: Deploy to P12-DEV
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $TargetDir = "G:\GITHUB\Data-Scientist-OC\P12-DEV"
          $Branch = "dev"
          $ProjectName = "p12_dev"
          $RepoUrl = "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

          if (-not (Test-Path $TargetDir)) {
              New-Item -ItemType Directory -Path $TargetDir -Force | Out-Null
          }

            # Le runner tourne sous SYSTEM : on declare ce dossier comme safe pour Git.
            git config --global --add safe.directory $TargetDir

          Set-Location $TargetDir

            if (-not (Test-Path (Join-Path $TargetDir ".git"))) {
              Write-Host "No .git found, initializing repository in existing folder..."
              git init
              git remote add origin $RepoUrl
            } else {
              if ((git remote) -notcontains "origin") {
                git remote add origin $RepoUrl
              } else {
                git remote set-url origin $RepoUrl
              }
            }

          git fetch origin $Branch
            git checkout -B $Branch "origin/$Branch"

          docker compose --project-name $ProjectName --env-file .env up -d --build
          docker compose ps

  deploy-prod:
    if: github.event_name == 'push' && github.ref_name == 'main'
    needs: test-and-build
    runs-on: [self-hosted, windows, p12-deploy]

    steps:
      - name: Deploy to P12-PROD
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $TargetDir = "G:\GITHUB\Data-Scientist-OC\P12-PROD"
          $Branch = "main"
          $ProjectName = "p12_prod"
          $RepoUrl = "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

          if (-not (Test-Path $TargetDir)) {
              New-Item -ItemType Directory -Path $TargetDir -Force | Out-Null
          }

            # Le runner tourne sous SYSTEM : on declare ce dossier comme safe pour Git.
            git config --global --add safe.directory $TargetDir

          Set-Location $TargetDir

            if (-not (Test-Path (Join-Path $TargetDir ".git"))) {
              Write-Host "No .git found, initializing repository in existing folder..."
              git init
              git remote add origin $RepoUrl
            } else {
              if ((git remote) -notcontains "origin") {
                git remote add origin $RepoUrl
              } else {
                git remote set-url origin $RepoUrl
              }
            }

          git fetch origin $Branch
            git checkout -B $Branch "origin/$Branch"

          docker compose --project-name $ProjectName --env-file .env up -d --build
          docker compose ps
