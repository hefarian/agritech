services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agritech_api
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "${API_CONTAINER_PORT:-8000}"]
    environment:
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-agritech}
    ports:
      - "${API_HOST_PORT:-8000}:${API_CONTAINER_PORT:-8000}"
    volumes:
      - ./:/app
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agritech_frontend
    command:
      [
        "streamlit",
        "run",
        "frontend/app.py",
        "--server.address=0.0.0.0",
        "--server.port=${FRONTEND_CONTAINER_PORT:-8501}",
      ]
    environment:
      API_URL: http://api:${API_CONTAINER_PORT:-8000}
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-agritech}
    depends_on:
      - api
    ports:
      - "${FRONTEND_HOST_PORT:-8501}:${FRONTEND_CONTAINER_PORT:-8501}"
    volumes:
      - ./:/app
    restart: unless-stopped

  mlflow:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agritech_mlflow
    command:
      [
        "mlflow",
        "ui",
        "--backend-store-uri",
        "./mlruns",
        "--host",
        "0.0.0.0",
        "--port",
        "${MLFLOW_CONTAINER_PORT:-5000}",
      ]
    ports:
      - "${MLFLOW_HOST_PORT:-5000}:${MLFLOW_CONTAINER_PORT:-5000}"
    volumes:
      - ./:/app
    restart: unless-stopped

  jupyter:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agritech_jupyter
    command:
      [
        "jupyter",
        "lab",
        "--ip=0.0.0.0",
        "--port=${JUPYTER_CONTAINER_PORT:-8888}",
        "--no-browser",
        "--IdentityProvider.token=${JUPYTER_TOKEN:-agritech}",
        "--ServerApp.allow_origin=*",
        "--ServerApp.root_dir=/app",
        "--allow-root",
      ]
    ports:
      - "${JUPYTER_HOST_PORT:-8888}:${JUPYTER_CONTAINER_PORT:-8888}"
    volumes:
      - ./:/app
    restart: unless-stopped

  preprocess:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "agritech.data.preprocess"]
    volumes:
      - ./:/app
    profiles: ["batch"]

  train:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["python", "-m", "agritech.models.train"]
    environment:
      COMPOSE_PROJECT_NAME: ${COMPOSE_PROJECT_NAME:-agritech}
    volumes:
      - ./:/app
    profiles: ["batch"]

  tests:
    build:
      context: .
      dockerfile: Dockerfile
    command:
      [
        "pytest",
        "--cov=agritech.data.preprocess",
        "--cov=agritech.models.train",
        "--cov=api.main",
        "--cov=frontend.app",
        "--cov-report=term-missing",
      ]
    volumes:
      - ./:/app
    profiles: ["qa"]
